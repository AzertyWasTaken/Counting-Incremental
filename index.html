<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incremental</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="icon" type="image/x-icon" href="favicon.png"> -->
</head>

<body>
    <h1>Counting Incremental</h1>

    <div class="row">
        <h3 style="margin: 0;">Score:</h3>
        <p style="font-size: 80px; margin: 0 6px; font-weight: 700px;" id="score">0</p>
    </div>

    <div class="row">
        <h3 style="margin: 0;">Subtraction Points:</h3>
        <p style="font-size: 60px; margin: 0 6px; font-weight: 700px;" id="subtraction-points">0</p>
    </div>

    <div class="row">
        <label style="font-size: 28px; margin: 8px; min-width: 0px;" id="count-cooldown">0</label>
        <button id="count">Count</button>
    </div>

    <hr>

    <div id="upgrades" class="upgrades"></div>

    <div class="upgrades">
        <div>
            <button id="reset-subtraction">Reset (required: 1000)</button>
            <p class="description">Reset all your upgrades for Subtraction Points — each Subtraction Point increase the base score multiplier by 1</p>

            <div class="row">
                <p class="upgrade-level" style="margin: 0;">Next reset:</p>
                <p style="font-size: 24px; margin: 0 2px; font-weight: 700px;" id="next-reset-subtraction-points">0</p>
            </div>

            <div style="margin-top: 16px;">
                <button id="erase-player-data" style="background: #C02020; color: white;">Erase player data</button>
                <p class="description">This clears your saved score, subtraction points, and purchased upgrades.</p>
            </div>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
